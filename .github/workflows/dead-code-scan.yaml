name: dead-code-scan

# Unused-export / unused-file detection (knip), reported to the PR job
# summary. The gap this fills: eslint's `no-unused-vars` only sees WITHIN a
# file, and the duplication scan only sees copy/paste — neither catches an
# export nobody imports, an orphaned file, or a helper whose last caller was
# removed (the `stateFileExists`/`parseCellRef` cascade #2149 left behind is
# exactly this class).
#
# Reports only — this workflow NEVER fails the build (`continue-on-error`).
# Two reasons, both mirroring `duplication-scan.yaml`:
#   1. The monorepo carries a pre-existing backlog of unused exports plus
#      some knip false positives (entry points knip can't infer — hook
#      stdin readers, codegen-consumed plugin definitions). Blocking on day
#      one would just train people to add `// knip-ignore` reflexively.
#   2. knip has no base-branch diffing, so the report is the FULL current
#      inventory, not this PR's delta. It's a review aid — a human decides
#      whether a finding is real and whether this PR made it worse — not a
#      gate. Revisit once the backlog is burned down and the config is tuned
#      enough to make a gate trustworthy.
#
# Config lives in `knip.json`; run it locally with `yarn knip`.

on:
  pull_request:
    branches:
      - main
    # Dead exports can only change when an analyzed input changes. Keep this
    # in sync with `knip.json`'s entry/project globs — notably `**/*.mjs`
    # (scripts/ entry points) and tsconfig, which drives module resolution.
    paths:
      - '**/*.ts'
      - '**/*.mjs'
      - '**/*.vue'
      - '**/tsconfig*.json'
      - 'knip.json'
      - '.github/workflows/dead-code-scan.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dead-code-scan:
    name: Dead Code Scan (knip)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # No git pushes from this job; don't leave the token in
          # .git/config (zizmor artipacked).
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      # knip resolves imports through the real dependency graph, so the
      # workspaces have to be installed. `--frozen-lockfile` keeps CI honest
      # against yarn.lock.
      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 120000

      # `|| true` on the knip step: it exits non-zero when it finds anything,
      # and this workflow is report-only. The `github-actions` reporter emits
      # `::warning::` annotations (surfaced on the PR) AND the run writes the
      # readable report to the job summary.
      - name: Run knip
        run: |
          set -uo pipefail
          {
            printf '## Dead code scan (knip)\n\n'
            printf 'Unused exports / files below. Report-only — a human decides\n'
            printf 'what is real. See .github/workflows/dead-code-scan.yaml.\n\n'
            printf '```\n'
            yarn --silent knip --reporter compact 2>&1 || true
            printf '```\n'
          } >> "$GITHUB_STEP_SUMMARY"
          yarn --silent knip --reporter github-actions || true
