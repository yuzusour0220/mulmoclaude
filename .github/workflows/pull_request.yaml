name: Node.js CI

on:
  pull_request:
    branches:
      - main
    # Skip when ALL changed files are docs / plans / top-level markdown.
    # Applied to lint_test + e2e — both jobs in this workflow are
    # value-added only when source / config / tests change. PRs that
    # only move plan files (e.g. plans/ → plans/done/ chore PRs) or
    # tweak markdown docs go straight to mergeable. paths-ignore is
    # AND-style: a PR that mixes a code change and a doc change still
    # runs CI in full.
    paths-ignore:
      - 'docs/**'
      - 'plans/**'
      - '**/*.md'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Detect whether a PR has any changes outside src/lang/**. Translation-only
  # PRs are gated out of e2e because rendered strings don't change browser
  # behavior, and `vue-tsc` (in lint_test below) already enforces the
  # 8-locale lockstep at the type level — a missing or extra key fails the
  # type check before it can land. Push events always run the full suite.
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_e2e: ${{ steps.filter.outputs.run_e2e }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false  # no git push; zizmor artipacked
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qv '^src/lang/'; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  lint_test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false  # no git push; zizmor artipacked
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        # Skip setup-node's built-in yarn cache on Windows — tar
        # extraction on NTFS is slower than a fresh install.
        # We use actions/cache for node_modules instead.
        cache: ${{ runner.os == 'Windows' && '' || 'yarn' }}
    # Windows: disable Defender realtime monitoring to prevent
    # EPERM on atomic rename (#CI)
    - name: Disable Windows Defender realtime monitoring
      if: runner.os == 'Windows'
      run: Set-MpPreference -DisableRealtimeMonitoring $true
      shell: powershell
    # Windows: cache node_modules directly (faster than yarn cache
    # because it skips the tar extract → yarn install file-write cycle).
    # restore-keys lets a yarn.lock change land on a warm node_modules
    # tree (yarn install fills in the diff) instead of a cold cache.
    - name: Cache node_modules (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v5
      with:
        path: node_modules
        key: win-node-modules-${{ matrix.node-version }}-${{ hashFiles('yarn.lock') }}
        restore-keys: |
          win-node-modules-${{ matrix.node-version }}-
    - run: yarn install --frozen-lockfile --network-timeout 120000
    # Cache the output of `yarn build:packages` keyed on the source
    # files it consumes. The 25 @mulmobridge/* workspaces all run tsc
    # serially / pairwise — slowest non-install step on Windows. When
    # no package source / tsconfig / package.json changed, skip the
    # build step entirely. Cache key includes runner.os and node
    # version because emitted JS can differ across them.
    - name: Cache packages/dist
      id: pkg-dist-cache
      uses: actions/cache@v5
      with:
        path: |
          packages/*/dist
          packages/bridges/*/dist
          packages/plugins/*/dist
        key: pkg-dist-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('packages/*/src/**', 'packages/*/tsconfig.json', 'packages/*/package.json', 'packages/bridges/*/src/**', 'packages/bridges/*/tsconfig.json', 'packages/bridges/*/package.json', 'packages/plugins/*/src/**', 'packages/plugins/*/tsconfig.json', 'packages/plugins/*/package.json', 'config/tsconfig.packages.json') }}
    - name: Build internal packages (required before typecheck)
      if: steps.pkg-dist-cache.outputs.cache-hit != 'true'
      run: yarn build:packages
    - run: yarn run typecheck
    - run: yarn run lint
    # Plugin barrel codegen must be in sync — fail the build if a
    # developer added a plugin dir without re-running the codegen.
    # `yarn run build` regenerates them via prebuild, but we want a
    # standalone signal so the PR diff doesn't accidentally hide the
    # drift inside `node_modules` or the dist artifact.
    - run: yarn run plugins:codegen:check
    - run: yarn run build
    # Bundle integrity: `yarn build` regenerates committed esbuild
    # artifacts (`server/workspace/wiki-history/hook/snapshot.mjs`
    # and `server/build/dispatcher.mjs`). If a developer changed the
    # TS source but forgot to commit the new bundle, this fails —
    # without the check a stale bundle would silently land on main.
    # Limited to the build outputs we know about so edits to other
    # generated files (e.g. dist/, packages/*/dist) don't
    # false-positive. The dispatcher bundle is sourcemap-free so its
    # output is deterministic across rebuilds — this gate would have
    # flapped on the old inline-sourcemap output. (Codex review
    # iter-1 #955.)
    - name: Verify built hook bundles are up-to-date
      run: git diff --exit-code -- server/workspace/wiki-history/hook/snapshot.mjs server/build/dispatcher.mjs
    - run: yarn run test:coverage
    # Subprocess-mode env-bound smoke for `requireSameOrigin` (#1463).
    # The main `test:coverage` glob exercises the env-UNSET path; this
    # step re-runs the same spec with `MULMOCLAUDE_TRUSTED_ORIGINS` set
    # so the EXPORTED middleware is exercised against a listed LAN
    # origin. Catches a typo like `requireSameOriginWith([])` at the
    # export site that the in-process suite cannot see (Node's ESM
    # resolver caches `env.ts` on first import).
    - run: yarn run test:csrf-wiring

  # Single Yarn 4 cell — Yarn 1 stays the primary tool for the lint_test
  # matrix, but this guards against duplicate-workspace-name (Yarn 4 is
  # strict where v1 was lenient) and pre-script removal regressions
  # (Berry doesn't run pre*/post* hooks; #956). Linux + Node 24 only.
  yarn4_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # no git push; zizmor artipacked
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Enable Yarn 4 via Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn --version
      # yarn.lock is v1 format (yarn 1 is the primary tool); Yarn 4
      # migrates it on install. Hardened mode auto-activates on public
      # PR runs and forbids that migration, failing with YN0028. The
      # smoke goal is "does the workspace install at all", not
      # lockfile-format drift, so opt out for this cell only. Risk
      # surface is unchanged: lint_test (yarn 1) covers the same
      # lockfile.
      - name: yarn install (Yarn 4)
        env:
          # CI auto-enables both: hardened mode (public-PR safety) and
          # immutable-installs (treats CI=true as --immutable). Both
          # forbid the v1 → v6 lockfile migration that has to happen
          # to install at all.
          YARN_ENABLE_HARDENED_MODE: "false"
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
        run: yarn install
      - name: yarn build:packages (verifies the dev/build script chain has no pre* dependency)
        run: yarn build:packages
      - name: yarn build
        run: yarn build
      - name: yarn lint
        run: yarn lint
      # Run the four typecheck pieces that are pure `tsc` calls; skip
      # `typecheck:packages` (= `yarn workspaces run typecheck`) which is
      # Yarn 1-only syntax. Same for `yarn test`'s tail
      # (`yarn workspaces run test`) — covered by lint_test on Yarn 1.
      - name: yarn typecheck (vue / server / test / e2e — skip :packages)
        run: yarn typecheck:vue && yarn typecheck:server && yarn typecheck:test && yarn typecheck:e2e

  e2e:
    needs: changes
    if: needs.changes.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Split the 268-test e2e suite across 2 parallel runners via
    # Playwright's --shard. Wall clock drops from ~8 min to ~4-5 min
    # at the cost of running twice the runner-minutes (no impact for
    # OSS / free tier). fail-fast off so a flake on shard 1 doesn't
    # mask a real failure on shard 2.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false  # no git push; zizmor artipacked
    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'yarn'
    - run: yarn install --frozen-lockfile --network-timeout 120000
    # Same packages/dist cache as lint_test — shares the cache key
    # across both jobs on ubuntu-latest + node 22.x, so whichever
    # finishes building first warms the cache for the other.
    - name: Cache packages/dist
      id: pkg-dist-cache
      uses: actions/cache@v5
      with:
        path: |
          packages/*/dist
          packages/bridges/*/dist
          packages/plugins/*/dist
        key: pkg-dist-${{ runner.os }}-22.x-${{ hashFiles('packages/*/src/**', 'packages/*/tsconfig.json', 'packages/*/package.json', 'packages/bridges/*/src/**', 'packages/bridges/*/tsconfig.json', 'packages/bridges/*/package.json', 'packages/plugins/*/src/**', 'packages/plugins/*/tsconfig.json', 'packages/plugins/*/package.json', 'config/tsconfig.packages.json') }}
    - name: Build internal packages
      if: steps.pkg-dist-cache.outputs.cache-hit != 'true'
      run: yarn build:packages
    - name: Install Playwright browsers
      run: npx playwright install chromium webkit --with-deps
    - name: Run E2E tests (shard ${{ matrix.shard }}/2)
      run: yarn test:e2e --shard=${{ matrix.shard }}/2
    - name: Upload test results on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-results-shard-${{ matrix.shard }}
        path: test-results/
        retention-days: 7
