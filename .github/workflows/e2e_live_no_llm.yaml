name: E2E Live (no LLM)

# Runs every e2e-live spec file as its own job. Each spec gates its
# Claude-dependent suites behind `process.env.E2E_LIVE_NO_LLM === "1"`
# via a `test.skip()` at the describe scope, so this workflow ends up
# running the workspace / wiki / routing checks while skipping the
# real-LLM scenarios. `fail-fast: false` keeps the matrix going so a
# single broken spec doesn't hide the rest.
#
# DISABLE_SANDBOX=1 is set on the dev server because CI runners have
# no logged-in Claude CLI; without it `assertClaudeFiles()` in
# server/system/docker.ts would exit 1 before Vite came up.

on:
  schedule:
    - cron: "0 18 * * *"  # Daily 18:00 UTC = 03:00 JST
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/e2e_live_no_llm.yaml"
      - "e2e-live/**"
      - "server/agent/backend/**"
      - "server/index.ts"

permissions:
  contents: read

concurrency:
  group: e2e-live-no-llm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-live:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        spec:
          # Specs that have at least one CI-eligible test. The dev
          # server runs with `MULMOCLAUDE_FAKE_AGENT=1` so chat turns
          # are served by the echo-stub backend; tests that need a
          # real reasoning LLM (presentForm tool-call, session
          # resume context recall, skills/media tool dispatch, etc.)
          # still self-skip on `E2E_LIVE_NO_LLM=1`.
          - wiki                     # 4 tests, no Claude needed
          - wiki-nav                 # 7 tests + L-15b (test.fail in CI)
          - workspace-link-routing   # L-23 / L-24 / linkify-codespan
          - ui                       # L-18 / L-19 / L-20 (L-18 via plugin-dispatch)
          - roles                    # 4 turns via fake-echo
          - session                  # L-11 / L-12 (history-aware fake-echo)
          - skills                   # L-21 (presentChart) / L-22 (slash-command)
          - mulmo-script-edit        # L-EDIT via plugin-dispatch
          - media                    # L-01 only (L-02..L-05 need real LLM / external tools)
          - error-banner             # L-ERR: forced error event → [Error] card
          - happy-tour               # L-HAPPY-TOUR: capability sweep (chat turn skips on E2E_LIVE_NO_LLM=1, the other 15 steps run)

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # no git push; zizmor artipacked

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 120000

      - name: Build internal packages (required by yarn dev)
        run: yarn build:packages

      - name: Install Playwright (chromium only)
        run: npx playwright install chromium --with-deps

      - name: Create workspace dir
        run: mkdir -p "$HOME/mulmoclaude"

      - name: Start mulmoclaude dev server (background)
        env:
          DISABLE_SANDBOX: "1"
          # Swap the claude-code backend for the echo-stub
          # (server/agent/backend/fake-echo.ts), lazy-loaded via
          # dynamic import so production never touches this code.
          MULMOCLAUDE_FAKE_AGENT: "1"
        run: |
          yarn dev > dev-server.log 2>&1 &
          echo $! > dev-server.pid
          echo "Started yarn dev with PID $(cat dev-server.pid)"

      - name: Wait for Vite (5173) to be ready
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:5173 > /dev/null 2>&1; then
              echo "Vite ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Vite did not come up in 180s — dumping tail of dev-server.log"
          tail -200 dev-server.log
          exit 1

      - name: Run ${{ matrix.spec }}.spec.ts
        env:
          E2E_LIVE_BASE_URL: http://localhost:5173
          E2E_LIVE_WORKERS: "2"
          E2E_LIVE_REPORT_SUBDIR: ${{ matrix.spec }}
          # Tells Claude-dependent suites to test.skip themselves.
          E2E_LIVE_NO_LLM: "1"
        run: |
          # --project=chromium: e2e-live's playwright config also
          # defines a webkit project, but we only install chromium
          # in the step above to keep the runner image lean.
          npx playwright test \
            --config e2e-live/playwright.config.ts \
            --project=chromium \
            ${{ matrix.spec }}.spec.ts

      - name: Stop dev server
        if: always()
        run: |
          if [ -f dev-server.pid ]; then
            kill "$(cat dev-server.pid)" 2>/dev/null || true
            sleep 2
            kill -9 "$(cat dev-server.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.spec }}
          path: playwright-report-live/${{ matrix.spec }}/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload dev server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dev-server-log-${{ matrix.spec }}
          path: dev-server.log
          retention-days: 7
          if-no-files-found: ignore
